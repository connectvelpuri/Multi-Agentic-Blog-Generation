name: BlogBoard Daily Generator

"on":
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: Generation mode
        required: true
        default: auto
        type: choice
        options:
          - auto
          - tutorial
          - ainews
          - fill-all

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install uv
          uv sync

      - name: Auto mode - generate tutorial
        if: ${{ github.event.inputs.mode == 'auto' || github.event.inputs.mode == '' || github.event_name == 'schedule' }}
        run: uv run python blogboard/run.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Tutorial mode
        if: ${{ github.event.inputs.mode == 'tutorial' }}
        run: uv run python blogboard/run.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: AI News mode
        if: ${{ github.event.inputs.mode == 'ainews' }}
        run: uv run python blogboard/run.py --ainews
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Fill-all mode (generate for empty domains)
        if: ${{ github.event.inputs.mode == 'fill-all' }}
        run: |
          uv run python blogboard/run.py
          uv run python blogboard/run.py
          uv run python blogboard/run.py
          uv run python blogboard/run.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blogboard/web

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
