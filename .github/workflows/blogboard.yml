name: BlogBoard Auto-Generate & Deploy

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 6 AM UTC
  workflow_dispatch:       # Manual trigger
  push:
    branches: [main]
    paths:
      - 'blogboard/web/**'
      - '.github/workflows/blogboard.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv and deps
        run: |
          pip install uv
          uv sync
      - name: Generate blog article (scheduled/manual only)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: uv run python blogboard/run.py
        env:
          llm__api_key: ${{ secrets.GROQ_API_KEY }}
          content__tavily_api_key: ${{ secrets.TAVILY_API_KEY }}
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blogboard/web
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
